task:
  name: ${concat:ResDexHand,${..side}}
  physics_engine: ${..physics_engine}
  seed: ${..seed}
  env:
    numEnvs: ${resolve_default:8192,${...num_envs}}
    dexhand: ${...dexhand}
    episodeLength: 1200
    training: ${if:${...test},False,True}
    usePIDControl: ${...usePIDControl}
    rolloutStateInit: ${resolve_default:False,${...rolloutStateInit}}
    randomStateInit: ${resolve_default:True,${...randomStateInit}}
    dataIndices: ${resolve_default:[],${...dataIndices}}
    obsFutureLength: 1
    rolloutLen: ${resolve_default:None,${...rolloutLen}}
    rolloutBegin: ${resolve_default:None,${...rolloutBegin}}
    clipObservations: 5.0
    clipActions: 1.0
    furniture: just_one_leg
    frankaDofNoise: 0.25
    targetLiftHeight: 0.05
    distanceReward: 0.1
    liftReward: 1.0
    successReward: 1.0
    aggregateMode: 3
    tightenSteps: 5000
    tightenMethod: adaptive
    tightenFactor: 1.0
    adaptiveRewardWindow: 10
    adaptiveStepWindow: 5
    adaptiveStepThreshold: 20
    adaptiveScaleFactorMin: 0.24
    adaptiveScaleFactorMax: 1.0
    adaptiveScaleStep: 0.02
    actionScale: 1.0
    useQuatRot: false
    propDumpInfo:
      q_rh: ${ndof:${....dexhand}}
      q_lh: ${ndof:${....dexhand}}
      dq_rh: ${ndof:${....dexhand}}
      dq_lh: ${ndof:${....dexhand}}
      state_rh: 13
      state_lh: 13
      state_manip_obj_rh: 13
      state_manip_obj_lh: 13
      joint_state_rh: ${eval:'${nbody:${....dexhand}}*13'}
      joint_state_lh: ${eval:'${nbody:${....dexhand}}*13'}
      tip_force_rh: 15
      tip_force_lh: 15
      reward: 1
    actionsMovingAverage: ${...actionsMovingAverage}
    translationScale: 1.0
    orientationScale: 0.1
    bimanual_mode: ${...bimanual_mode}
    propObsDim: ${is_both_hands:${eval:'13+${ndof:${...dexhand}}*3'},${...side}}
    obsKeys:
    - q
    - cos_q
    - sin_q
    - base_state
    privilegedObsDim: ${is_both_hands:${eval:'${ndof:${...dexhand}}+13+5*4+3+1'},${...side}}
    privilegedObsKeys:
    - dq
    - manip_obj_pos
    - manip_obj_quat
    - manip_obj_vel
    - manip_obj_ang_vel
    - tip_force
    - manip_obj_com
    - manip_obj_weight
    enableCameraSensors: false
  sim:
    dt: 0.0166667
    substeps: 2
    up_axis: z
    use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
    gravity:
    - 0.0
    - 0.0
    - -9.81
    physx:
      num_threads: ${....num_threads}
      solver_type: ${....solver_type}
      use_gpu: ${contains:"cuda",${....sim_device}}
      num_position_iterations: 8
      num_velocity_iterations: 1
      contact_offset: 0.005
      rest_offset: 0.0
      bounce_threshold_velocity: 0.2
      max_depenetration_velocity: 1.0
      default_buffer_size_multiplier: 8.0
      max_gpu_contact_pairs: 16777216
      num_subscenes: ${....num_subscenes}
      contact_collection: 1
  task:
    randomize: ${if:${...test},False,True}
    randomization_params:
      frequency: 32
      sim_params:
        gravity:
          operation: scaling
          schedule: linear_decay
          schedule_steps: 1920
          end_factor: 0.4
          external_sample:
            type: const_scale
            init_value: 0
      actor_params:
        manip_obj:
          color: true
          rigid_shape_properties:
            friction:
              num_buckets: 250
              operation: scaling
              schedule: linear_decay
              schedule_steps: 1920
              end_factor: 0.4
              external_sample:
                type: const_scale
                init_value: 6
                upper_bound: 6.0
                lower_bound: 1.0
        manip_obj_rh:
          color: true
          rigid_shape_properties:
            friction:
              num_buckets: 250
              operation: scaling
              schedule: linear_decay
              schedule_steps: 1920
              end_factor: 0.4
              external_sample:
                type: const_scale
                init_value: 6
                upper_bound: 6.0
                lower_bound: 1.0
        manip_obj_lh:
          color: true
          rigid_shape_properties:
            friction:
              num_buckets: 250
              operation: scaling
              schedule: linear_decay
              schedule_steps: 1920
              end_factor: 0.4
              external_sample:
                type: const_scale
                init_value: 6
                upper_bound: 6.0
                lower_bound: 1.0
rl_train:
  params:
    seed: ${...seed}
    algo:
      name: ppo
    model:
      name: ${res_side:${....side},my_continuous_a2c_logstd}
      base_model_obs_shape:
        privileged: ${...base_privileged_dim}
        proprioception: ${...base_proprioception_dim}
        target: ${...base_target_dim}
      rh_base_model_checkpoint: ${..rh_base_model_checkpoint}
      lh_base_model_checkpoint: ${..lh_base_model_checkpoint}
    network:
      name: ${res_side:${....side},dict_obs_actor_critic}
      separate: false
      space:
        continuous:
          mu_activation: None
          sigma_activation: None
          mu_init:
            name: glorot_normal_initializer
            gain: 0.01
          sigma_init:
            name: const_initializer
            val: -1
          fixed_sigma: true
      dict_feature_encoder:
        _target_: lib.nn.features.SimpleFeatureFusion
        extractors:
          privileged:
            _target_: lib.nn.features.Identity
            input_dim: ${is_united_model:${.......bimanual_mode},${.......side},${eval:'${.....base_privileged_dim}+13+5*4+3+1'}}
          proprioception:
            _target_: lib.nn.features.Identity
            input_dim: ${is_united_model:${.......bimanual_mode},${.......side},${.....base_proprioception_dim}}
          target:
            _target_: lib.nn.features.Identity
            input_dim: ${is_united_model:${.......bimanual_mode},${.......side},${eval:'${.....base_target_dim}+3+3+3+4+4+3+3+${nbody:${.....dexhand}}+5+128'}}
        hidden_depth: 3
        hidden_dim: 512
        output_dim: 256
        activation: swish
        add_input_activation: false
        add_output_activation: false
      mlp:
        units:
        - 256
        - 512
        - 128
        - 64
        activation: elu
        d2rl: false
        initializer:
          name: default
        regularizer:
          name: None
      base_model:
        name: dict_obs_actor_critic
        rh_checkpoint: ${...rh_base_model_checkpoint}
        lh_checkpoint: ${...lh_base_model_checkpoint}
        separate: false
        action_size: ${eval:'6+${ndof:${...dexhand}}'}
        space:
          continuous:
            mu_activation: None
            sigma_activation: None
            mu_init:
              name: default
            sigma_init:
              name: const_initializer
              val: 0
            fixed_sigma: true
        dict_feature_encoder:
          _target_: lib.nn.features.SimpleFeatureFusion
          extractors:
            privileged:
              _target_: lib.nn.features.Identity
              input_dim: ${......base_privileged_dim}
            proprioception:
              _target_: lib.nn.features.Identity
              input_dim: ${......base_proprioception_dim}
            target:
              _target_: lib.nn.features.Identity
              input_dim: ${......base_target_dim}
          hidden_depth: 3
          hidden_dim: 512
          output_dim: 256
          activation: swish
          add_input_activation: false
          add_output_activation: false
        mlp:
          units:
          - 256
          - 512
          - 128
          - 64
          activation: elu
          d2rl: false
          initializer:
            name: default
          regularizer:
            name: None
    load_checkpoint: ${if:${...checkpoint},True,False}
    load_path: ${...checkpoint}
    rh_base_model_checkpoint: ${...rh_base_model_checkpoint}
    lh_base_model_checkpoint: ${...lh_base_model_checkpoint}
    dexhand: ${...dexhand}
    base_privileged_dim: ${ndof:${dexhand}}
    base_proprioception_dim: ${eval:'13+${ndof:${...dexhand}}*3'}
    base_target_dim: ${eval:'3+3+3+4+4+3+3+(${nbody:${...dexhand}}-1)*3*3'}
    config:
      name: ${resolve_default:ResDexHand,${....experiment}}
      full_experiment_name: transfer_vase_from_utility_cart_to_shelf_then_to_utility_cart_with_both_hands-798_inspire_new__12-28-23-09-09
      env_name: rlgpu
      multi_gpu: ${....multi_gpu}
      ppo: true
      mixed_precision: false
      normalize_input: true
      normalize_input_excluded_keys: []
      normalize_value: true
      use_pid_control: ${....usePIDControl}
      value_bootstrap: true
      num_actors: ${....task.env.numEnvs}
      reward_shaper:
        scale_value: 1.0
      normalize_advantage: true
      gamma: 0.99
      tau: 0.95
      learning_rate: ${resolve_default:5e-4,${....learning_rate}}
      lr_schedule: warmup
      warmup_steps: 10
      schedule_type: standard
      kl_threshold: 0.008
      score_to_win: 10000
      max_epochs: ${resolve_default:10000,${....max_iterations}}
      early_stop_epochs: ${resolve_default:500,${....early_stop_epochs}}
      save_best_after: 2
      save_frequency: 100
      print_stats: true
      grad_norm: 1.0
      entropy_coef: 0.0
      truncate_grads: true
      e_clip: 0.2
      horizon_length: 32
      minibatch_size: 1024
      mini_epochs: 5
      critic_coef: 4
      clip_value: true
      seq_len: 4
      bounds_loss_coef: 0.0001
      use_soft_clamp: true
      mix_ratio: 0.5
task_name: ${task.name}
