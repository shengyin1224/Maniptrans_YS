# used to create the object
name: ${concat:ResDexHand,${..side}}

physics_engine: ${..physics_engine}
seed: ${..seed}

# if given, will override the device setting in gym.
env:
  numEnvs: ${resolve_default:8192,${...num_envs}}
  dexhand: ${...dexhand}

  episodeLength: 1200
  training: ${if:${...test},False,True}

  usePIDControl: ${...usePIDControl}

  rolloutStateInit: ${resolve_default:False,${...rolloutStateInit}}
  randomStateInit: ${resolve_default:True,${...randomStateInit}}

  dataIndices: ${resolve_default:[],${...dataIndices}}
  obsFutureLength: 1

  rolloutLen: ${resolve_default:None,${...rolloutLen}}
  rolloutBegin: ${resolve_default:None,${...rolloutBegin}}

  clipObservations: 5.0
  clipActions: 1.0

  furniture: just_one_leg

  frankaDofNoise: 0.25

  targetLiftHeight: 0.05
  distanceReward: 0.1
  liftReward: 1.0
  successReward: 1.0

  aggregateMode: 3

  # tightenMethod: "linear_decay"  # 从 exp_decay 改为 linear_decay：更直观，初期更宽松
  # tightenFactor: 0.85 # 从 0.7 提升到 0.85：避免训练后期阈值过严（基于失败诊断分析：scale_factor=0.7时阈值太严格，无法容纳实际误差）
  tightenSteps: 5000

  tightenMethod: "adaptive"  # 使用自适应难度调整
  tightenFactor: 1.0  # 初始scale_factor（可选，默认1.0）
  
  rewardInteractScale: ${resolve_default:2.0,${...reward_interact_scale}}
  terminateOnEEF: ${resolve_default:False,${...terminate_on_eef}}
  adaptiveSamplingAllBinsThreshold: ${resolve_default:0.40,${...adaptive_sampling_all_bins_threshold}}
  adaptiveStuckThreshold: ${resolve_default:50,${...adaptive_stuck_threshold}}
  
  # 自适应难度调整参数（可选，有默认值）
  adaptiveRewardWindow: 10      # 检查reward稳定性的窗口大小（默认10轮）
  adaptiveStepWindow: 5         # 检查step的窗口大小（默认5轮）
  adaptiveStepThreshold: 20     # step阈值，低于此值则降低难度（默认20步）
  adaptiveScaleFactorMin: 0.24   # scale_factor最小值（默认0.7）
  adaptiveScaleFactorMax: 1.0   # scale_factor最大值（默认1.0）
  adaptiveScaleStep: 0.02       # 每次调整的步长（默认0.05）

  actionScale: 1.0
  useQuatRot: false
  hide_hands: ${resolve_default:False,${...hide_hands}}

  support_force:
    kp: ${resolve_default:10.0,${....support_force_kp}}
    kd: ${resolve_default:3.0,${....support_force_kd}}
    end_factor: ${resolve_default:0.4,${....support_force_end_factor}}

  # for distillation
  propDumpInfo:
    q_rh: ${ndof:${....dexhand}}
    q_lh: ${ndof:${....dexhand}}
    dq_rh: ${ndof:${....dexhand}}
    dq_lh: ${ndof:${....dexhand}}
    state_rh: 13
    state_lh: 13
    state_manip_obj_rh: 13
    state_manip_obj_lh: 13
    joint_state_rh: ${eval:'${nbody:${....dexhand}}*13'}
    joint_state_lh: ${eval:'${nbody:${....dexhand}}*13'}
    tip_force_rh: 15 # todo four fingers
    tip_force_lh: 15
    reward: 1

  actionsMovingAverage: ${...actionsMovingAverage}
  translationScale: 1.0
  orientationScale: 0.1
  bimanual_mode: ${...bimanual_mode}

  propObsDim: ${is_both_hands:${eval:'13+${ndof:${...dexhand}}*3'},${...side}}
  obsKeys:
    - q
    - cos_q
    - sin_q
    - base_state

  privilegedObsDim: ${is_both_hands:${eval:'${ndof:${...dexhand}}+13+5*4+3+1'},${...side}}
  privilegedObsKeys:
    - dq # must be the first element
    - manip_obj_pos
    - manip_obj_quat
    - manip_obj_vel
    - manip_obj_ang_vel
    - tip_force
    - manip_obj_com
    - manip_obj_weight


  # set to True if you use camera sensors in the environment
  enableCameraSensors: False

sim:
  dt: 0.0166667 # 1/60
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}} # set to False to run on CPU
    num_position_iterations: 8
    num_velocity_iterations: 1
    contact_offset: 0.005
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1.0
    default_buffer_size_multiplier: 8.0
    max_gpu_contact_pairs: 16777216 # 2**22
    num_subscenes: ${....num_subscenes}
    contact_collection: 1 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

task:
  randomize: ${if:${...test},False,True}
  randomization_params:
    frequency: 32
    sim_params:
      gravity:
        operation: "scaling"
        schedule: "linear_decay"
        schedule_steps: 1920
        end_factor: 0.4
        external_sample:
          type: "const_scale"
          init_value: 0
    actor_params:
      manip_obj:
        color: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            operation: "scaling"
            schedule: "linear_decay"
            schedule_steps: 1920
            end_factor: 0.4
            external_sample:
              type: "const_scale"
              init_value: 6
              upper_bound: 6.0
              lower_bound: 1.0
      manip_obj_rh:
        color: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            operation: "scaling"
            schedule: "linear_decay"
            schedule_steps: 1920
            end_factor: 0.4
            external_sample:
              type: "const_scale"
              init_value: 6
              upper_bound: 6.0
              lower_bound: 1.0
      manip_obj_lh:
        color: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            operation: "scaling"
            schedule: "linear_decay"
            schedule_steps: 1920
            end_factor: 0.4
            external_sample:
              type: "const_scale"
              init_value: 6
              upper_bound: 6.0
              lower_bound: 1.0